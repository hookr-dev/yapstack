name: CI Checks

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: Create sidecar placeholder
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            touch apps/desktop/src-tauri/binaries/yapstack-sidecar-x86_64-pc-windows-msvc.exe
          else
            touch apps/desktop/src-tauri/binaries/yapstack-sidecar-aarch64-apple-darwin
          fi

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Check sidecar with whisper feature (Windows)
        if: runner.os == 'Windows'
        run: cargo check -p yapstack-sidecar --features whisper
        # Note: cuda feature requires CUDA toolkit; only enabled in release builds

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.2 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter @yapstack/desktop lint

      - name: Type check
        run: pnpm --filter @yapstack/desktop typecheck

      - name: Test
        run: pnpm --filter @yapstack/desktop test
