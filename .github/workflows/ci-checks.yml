name: CI Checks

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust:
    name: Rust (macos-latest)
    runs-on: macos-latest
    # whisper-rs-sys bundles whisper.cpp; on Apple Silicon (macos-latest)
    # ggml-cpu's ARM quants.c uses `vmmlaq_s32`, which requires the i8mm
    # target feature. The bundled cmake build doesn't auto-enable it on
    # plain `cargo build`, so the C compiler errors with:
    #   error: always_inline function 'vmmlaq_s32' requires target feature 'i8mm'
    # Setting CFLAGS / CXXFLAGS to `-march=native` lets clang detect and
    # enable i8mm (and dotprod, etc.) on the runner. release.yml dodges
    # this by building with `--target aarch64-apple-darwin --features
    # whisper,parakeet,metal,...`, which routes through different paths.
    env:
      CFLAGS: "-march=native"
      CXXFLAGS: "-march=native"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cmake
        run: brew install cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: ci-macos-latest

      - name: Create sidecar + framework placeholders
        # tauri.conf.json declares an externalBin (sidecar) and a
        # macOS framework dylib (libwebgpu_dawn.dylib for parakeet-rs's
        # WebGPU EP). The Tauri build script validates both paths
        # exist before linking. Locally `scripts/build-transcription-sidecar.sh`
        # copies them from target/<triple>/<profile>/; in CI we just
        # need the files to exist so cargo check / clippy / test pass.
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          touch apps/desktop/src-tauri/binaries/yapstack-transcription-sidecar-aarch64-apple-darwin
          touch apps/desktop/src-tauri/binaries/libwebgpu_dawn.dylib

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Run tests
        run: cargo test --all

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.2 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter @yapstack/desktop lint

      - name: Type check
        run: pnpm --filter @yapstack/desktop typecheck

      - name: Test
        run: pnpm --filter @yapstack/desktop test
