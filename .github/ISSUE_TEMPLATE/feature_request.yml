name: Feature request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the **problem** before the solution — it helps us understand the underlying need and consider alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem are you trying to solve? Who hits it and how often?
      placeholder: When recording long meetings, ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you address it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about? Why does the proposal beat them?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (bug-fix sized — minor UX or config change)
        - Medium (new component, single feature surface)
        - Large (architectural change, new subsystem)
        - Not sure

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links to similar apps, related issues.
